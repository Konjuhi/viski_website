name: Deploy Flutter Web to GitHub Pages

  on:
    push:
      branches:
        - main
    workflow_dispatch:

  permissions:
    contents: read
    pages: write
    id-token: write

  concurrency:
    group: github-pages
    cancel-in-progress: true

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
            channel: stable
            cache: true

        - name: Get dependencies
          run: flutter pub get

        - name: Run tests
          run: flutter test

        - name: Build web app
          run: flutter build web --release --base-href /viski_website/

        - name: Configure GitHub Pages
          uses: actions/configure-pages@v5

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v4
          with:
            path: build/web

    deploy:
      needs: build
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
