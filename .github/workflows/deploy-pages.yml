name: Deploy Jaspr Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.9.2'

      - name: Get dependencies
        run: dart pub get

      - name: Activate jaspr CLI
        run: dart pub global activate jaspr_cli 0.22.4

      - name: Run tests
        run: dart test test/core/ test/features/

      - name: Build web app
        run: dart pub global run jaspr_cli build

      - name: Set base href for GitHub Pages
        run: sed -i 's|<head>|<head><base href="/viski_website/">|' build/jaspr/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/jaspr

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
