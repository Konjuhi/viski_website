name: Deploy Jaspr Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        run: dart pub get

      - name: Run tests
        run: dart test test/core/ test/features/

      - name: Compile Dart to JS
        run: |
          mkdir -p build/web
          dart compile js -O2 --output=build/web/main.dart.js lib/main.dart

      - name: Copy web assets
        run: |
          cp web/index.html build/web/
          cp web/styles.css build/web/
          cp web/favicon.png build/web/ 2>/dev/null || true
          cp web/manifest.json build/web/ 2>/dev/null || true
          cp -r web/icons build/web/ 2>/dev/null || true
          sed -i 's|<head>|<head><base href="/viski_website/">|' build/web/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
